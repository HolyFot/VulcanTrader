<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>VulcanTrader - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1b1b1b 0%, #14131b 50%, #0d0b16 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: linear-gradient(135deg, #1b1b1b 0%, #14131b 50%, #0d0b16 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            max-width: 420px;
            width: 100%;
            overflow: hidden;
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .login-header {
            background: linear-gradient(110deg, #4c1d95 0%, #7c3aed 45%, #60a5fa 100%);
            padding: 2rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }
        .login-header p {
            margin-top: 0.5rem;
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.9rem;
        }
        .login-body { padding: 2rem 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e0e0e0;
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #695ff5;
            box-shadow: 0 0 0 3px rgba(105, 95, 245, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #4c17ad 0%, #341664 50%, #190538 100%);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(105, 95, 245, 0.4);
        }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-error {
            background: linear-gradient(135deg, rgba(185, 28, 28, 0.2), rgba(127, 29, 29, 0.2));
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            color: #fca5a5;
            font-size: 0.875rem;
        }
        .login-footer {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            font-size: 0.8rem;
            color: #a0aec0;
        }
        .login-footer a { color: #695ff5; text-decoration: none; }
        .login-footer a:hover { text-decoration: underline; }
        .spinner-small {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.25);
            border-left-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* === VulcanTrader Pro UI overrides === */
        body {
            background:
                linear-gradient(135deg, rgba(15,5,20,0.55), rgba(10,5,15,0.78)),
                url('/static/background.jpg') center/cover fixed no-repeat,
                linear-gradient(135deg, #1b0a14 0%, #14081a 50%, #0d0610 100%) !important;
        }
        .login-card {
            background: linear-gradient(135deg, rgba(27,27,27,0.72) 0%, rgba(20,19,27,0.72) 50%, rgba(13,11,22,0.78) 100%) !important;
            backdrop-filter: blur(14px) saturate(140%);
            -webkit-backdrop-filter: blur(14px) saturate(140%);
            border: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 16px 48px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.05) inset !important;
        }
        .login-header {
            position: relative;
            background: linear-gradient(110deg, #4c1d95 0%, #7c3aed 45%, #60a5fa 100%) !important;
            border-bottom: 1px solid rgba(255,255,255,0.1) !important;
        }
        .login-header::after {
            content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 2px;
            background: linear-gradient(90deg, transparent 0%, #695ff5 25%, #6666ff 50%, #695ff5 75%, transparent 100%);
            box-shadow: 0 0 12px rgba(105,95,245,0.5);
        }
        .login-header h1 {
            font-family: 'Cinzel', serif !important;
            font-weight: 700 !important;
            letter-spacing: 0.12em !important;
            text-shadow: 0 3px 8px rgba(0,0,0,0.85), 0 0 22px rgba(105,95,245,0.5) !important;
        }
        .login-header p {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.08em;
            font-weight: 500;
        }
        .btn-login {
            background: linear-gradient(135deg, rgba(76,23,173,0.88) 0%, rgba(52,22,100,0.88) 50%, rgba(25,5,56,0.92) 100%), url('/static/buttonBG.png') center/cover no-repeat !important;
            background-blend-mode: normal, normal !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
            border-radius: 0 !important;
            padding: 14px 28px !important;
            min-width: 160px;
            font-family: 'Cinzel', serif !important;
            font-weight: 700 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.10em !important;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4), 0 1px 0 rgba(255,255,255,0.12) inset !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.85), 0 0 8px rgba(0,0,0,0.6);
            color: #f5f5f5 !important;
            transition: all 0.3s ease;
        }
        .btn-login:hover:not(:disabled) {
            transform: scale(1.04);
            box-shadow: 0 12px 32px rgba(105,95,245,0.5), 0 1px 0 rgba(255,255,255,0.18) inset !important;
            filter: drop-shadow(0 0 6px rgba(105,95,245,0.4));
        }
        .form-input {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
        }
        .form-input:focus {
            border-color: #695ff5 !important;
            box-shadow: 0 0 0 3px rgba(105,95,245,0.2) !important;
        }
        .login-footer a { color: #695ff5 !important; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>VulcanTrader</h1>
            <p>Sign in to access the dashboard</p>
        </div>
        <div class="login-body">
            <div id="error" class="login-error" style="display:none;"></div>
            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" class="form-input" value="admin" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" class="form-input" required autocomplete="current-password">
                </div>
                <button type="submit" id="submit-btn" class="btn-login">Sign In</button>
            </form>
            <div class="login-footer">
                <a href="/trading">Trading</a> &nbsp;·&nbsp;
                <a href="/backtester">Backtester</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errBox = document.getElementById('error');
        const btn = document.getElementById('submit-btn');

        // Auto-redirect if already authenticated
        if (localStorage.getItem('VulcanTrader_token')) {
            window.location.href = '/trading';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errBox.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-small"></span>Signing in...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    }),
                });
                if (!res.ok) {
                    const j = await res.json().catch(() => ({}));
                    throw new Error(j.detail || `HTTP ${res.status}`);
                }
                const data = await res.json();
                localStorage.setItem('VulcanTrader_token', data.token);
                window.location.href = '/trading';
            } catch (err) {
                errBox.textContent = err.message || 'Login failed';
                errBox.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
